name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - feat/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + backend + frontend
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://example.invalid/api/v1
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCIPlaceholderKey000000000000000000
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: example.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: example-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: example-project.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "1234567890"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:1234567890:web:abcdef123456"
